version: '2.4'
services:
  kernel-modules:
    image: __BUILD_OUTPUT__
    x-build:
      recipe: balena-kernel-modules-block
      layers:
        - layers/meta-kernel-modules-block
      sample_conf: layers/meta-kernel-modules-block/conf/samples
    profiles:
      - kernel-modules
    labels:
      io.balena.image.store: 'data'
      io.balena.image.class: 'overlay'
      io.balena.image.requires-reboot: '1'
      io.balena.image.profiles: 'kernel-modules'
      io.balena.image.os-version: $OS_VERSION
      io.balena.image.kernel-version: $KERNEL_VERSION
      io.balena.image.kernel-abi-id: $KERNEL_ABI_ID
