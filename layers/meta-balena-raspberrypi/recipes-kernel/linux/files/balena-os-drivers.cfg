# Drivers and helpers enabled on top of the upstream raspberrypi defconfig for
# balenaOS. Picked up by kernel-balena's do_kernel_balena_merge_fragments (via
# FILESEXTRAPATHS), so it applies to both linux-raspberrypi (the OS kernel) and
# linux-raspberrypi-extension without duplication.
#
# Machine-conditional entries (optimize-size for rpi3-64/rpi4-64, pieeprom for
# rpi4-64) remain in BALENA_CONFIGS in the bbappend — they're easier to keep
# behind :append:<machine> overrides than to express in a flat fragment.

# fbtft framebuffers
CONFIG_STAGING=y
CONFIG_FB_TFT=m
CONFIG_FB_TFT_AGM1264K_FL=m
CONFIG_FB_TFT_BD663474=m
CONFIG_FB_TFT_HX8340BN=m
CONFIG_FB_TFT_HX8347D=m
CONFIG_FB_TFT_HX8353D=m
CONFIG_FB_TFT_ILI9163=m
CONFIG_FB_TFT_ILI9320=m
CONFIG_FB_TFT_ILI9325=m
CONFIG_FB_TFT_ILI9340=m
CONFIG_FB_TFT_ILI9341=m
CONFIG_FB_TFT_ILI9481=m
CONFIG_FB_TFT_ILI9486=m
CONFIG_FB_TFT_PCD8544=m
CONFIG_FB_TFT_RA8875=m
CONFIG_FB_TFT_S6D02A1=m
CONFIG_FB_TFT_S6D1121=m
CONFIG_FB_TFT_SSD1289=m
CONFIG_FB_TFT_SSD1306=m
CONFIG_FB_TFT_SSD1331=m
CONFIG_FB_TFT_SSD1351=m
CONFIG_FB_TFT_ST7735R=m
CONFIG_FB_TFT_TINYLCD=m
CONFIG_FB_TFT_TLS8204=m
CONFIG_FB_TFT_UC1701=m
CONFIG_FB_TFT_UPD161704=m
CONFIG_FB_TFT_WATTEROTT=m

# pca955 GPIO expander
CONFIG_GPIO_PCA953X=y
CONFIG_GPIO_PCA953X_IRQ=y

# Kontron PLD (gpio_i2c_kempld) — deps + leaf modules
CONFIG_GPIOLIB=y
CONFIG_I2C=y
CONFIG_HAS_IOMEM=y
CONFIG_MFD_KEMPLD=m
CONFIG_GPIO_KEMPLD=m
CONFIG_I2C_KEMPLD=m

# RPi watchdog
CONFIG_WATCHDOG=y
CONFIG_BCM2835_WDT=y

# Kvaser USB CAN driver
CONFIG_CAN_KVASER_USB=m

# MCP251x CAN driver — deps + leaf module
CONFIG_SPI=y
CONFIG_HAS_DMA=y
CONFIG_CAN_MCP251X=m

# CAN bit timing
CONFIG_CAN_DEV=y
CONFIG_CAN_CALC_BITTIMING=y

# DS1307 RTC
CONFIG_RTC_DRV_DS1307=m

# SC16IS7xx serial
CONFIG_SERIAL_SC16IS7XX=m

# MCP3422 ADC
CONFIG_MCP3422=m

# SD8787 PWRSEQ — deps + leaf module
CONFIG_OF=y
CONFIG_PWRSEQ_SD8787=m

# 8250 serial
CONFIG_SERIAL_8250=y
CONFIG_SERIAL_8250_CONSOLE=y
CONFIG_SERIAL_8250_NR_UARTS=1
CONFIG_SERIAL_8250_EXTENDED=y
CONFIG_SERIAL_8250_SHARE_IRQ=y
CONFIG_SERIAL_8250_BCM2835AUX=y

# IIO pressure drivers
CONFIG_BMP280=m

# Realtek RTL8192CU WiFi
CONFIG_RTL8192CU=m
